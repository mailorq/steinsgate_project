# Dev-режим с горячим обновлением без пересборки контейнеров:
# docker compose -f compose.yaml -f compose.dev.yaml up
# Фронт: vite dev server с HMR на http://localhost:5173
# Бэк: runserver с автоперезагрузкой при изменении кода
services:
  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: 5432
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
    volumes:
      - ./backend:/app
      - django_media:/app/media

  frontend:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --port 5173"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
      VITE_USE_POLLING: "1"
    ports: !override
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
