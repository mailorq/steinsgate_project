server {
    listen 4173;
    listen [::]:4173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Лимит под загрузку аватаров (бэкенд принимает до 8 MB)
    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Хэшированные ассеты Vite — кэшируются навсегда
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Статика Django-админки: collectstatic пишет в общий volume
    location /static/ {
        alias /srv/django-static/;
    }

    # Файлы, загруженные пользователями (аватары)
    location /media/ {
        alias /srv/django-media/;
    }

    # SPA: client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
